<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据诊断 - 行星探路者</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0B1E3B 0%, #1a3a5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 { font-size: 24px; margin-bottom: 30px; text-align: center; }
        .section {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 { font-size: 18px; margin: 0 0 15px; color: #ff6b35; }
        .data-item {
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .data-label { color: rgba(255,255,255,0.6); font-size: 11px; margin-bottom: 5px; }
        .data-value { font-family: monospace; word-break: break-all; }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
        .empty { color: rgba(255,255,255,0.4); text-align: center; padding: 20px; }
        .log { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .log-item { margin-bottom: 5px; word-break: break-all; }
        .log-success { color: #51cf66; }
        .log-error { color: #ff6b6b; }
        .log-info { color: #74c0fc; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-left: 10px; }
        .badge-success { background: rgba(34,197,94,0.2); color: #22c55e; }
        .badge-error { background: rgba(239,68,68,0.2); color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 数据诊断</h1>
        
        <div class="section">
            <h2>📊 Supabase 数据库</h2>
            <div id="supabaseData"></div>
            <button class="btn" onclick="checkSupabase()">刷新云端数据</button>
        </div>
        
        <div class="section">
            <h2>💾 本地存储</h2>
            <div id="localStorage"></div>
            <button class="btn" onclick="checkLocalStorage()">刷新本地数据</button>
        </div>
        
        <div class="section">
            <h2>🔗 连接测试</h2>
            <button class="btn" onclick="testConnection()">测试云端连接</button>
            <button class="btn" onclick="insertTestData()">插入测试数据</button>
            <button class="btn" onclick="clearTestData()">清理测试数据</button>
        </div>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        var SUPABASE_URL = 'https://ufnxulsoyownqyqwolxm.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmbnh1bHNveW93bnF5cXdvbHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI1NjEsImV4cCI6MjA4ODM4ODU2MX0.RO6QRQZlilS6v1H-C_MWcLd5QFv4UvWZvO7F8HNFd0E';
        
        var logEl = document.getElementById('log');
        var supabase;
        
        function log(msg, type) {
            var div = document.createElement('div');
            div.className = 'log-item log-' + (type || 'info');
            div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }
        
        function init() {
            if (typeof window.supabase === 'undefined') {
                log('Supabase SDK 未加载', 'error');
                return;
            }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            log('Supabase 客户端已初始化', 'success');
            
            checkSupabase();
            checkLocalStorage();
        }
        
        async function checkSupabase() {
            log('检查云端数据...', 'info');
            
            try {
                // 获取申请数
                var appsResult = await supabase.from('applications').select('*', { count: 'exact', head: true });
                var appCount = appsResult.count || 0;
                
                // 获取管理员数
                var adminsResult = await supabase.from('admins').select('*', { count: 'exact', head: true });
                var adminCount = adminsResult.count || 0;
                
                // 获取最近的申请
                var recentApps = await supabase.from('applications').select('name,college,major,submit_time').order('submit_time', { ascending: false }).limit(5);
                
                var html = '';
                html += '<div class="data-item"><div class="data-label">申请总数</div><div class="data-value">' + appCount + ' 条</div></div>';
                html += '<div class="data-item"><div class="data-label">管理员总数</div><div class="data-value">' + adminCount + ' 个</div></div>';
                
                if (recentApps.data && recentApps.data.length > 0) {
                    html += '<div class="data-label" style="margin-top:15px;">最近的申请：</div>';
                    recentApps.data.forEach(function(app) {
                        html += '<div class="data-item">';
                        html += '<div><strong>' + app.name + '</strong></div>';
                        html += '<div>' + app.college + ' · ' + app.major + '</div>';
                        html += '<div style="color:rgba(255,255,255,0.5);font-size:11px;">' + new Date(app.submit_time).toLocaleString('zh-CN') + '</div>';
                        html += '</div>';
                    });
                } else {
                    html += '<div class="empty">暂无申请数据</div>';
                }
                
                document.getElementById('supabaseData').innerHTML = html;
                log('云端数据加载成功：' + appCount + ' 条申请', 'success');
                
            } catch (err) {
                log('云端数据加载失败：' + err.message, 'error');
                document.getElementById('supabaseData').innerHTML = '<div class="empty">加载失败：' + err.message + '</div>';
            }
        }
        
        function checkLocalStorage() {
            log('检查本地数据...', 'info');
            
            var apps = JSON.parse(localStorage.getItem('applications') || '[]');
            var admins = JSON.parse(localStorage.getItem('admins') || '[]');
            
            var html = '';
            html += '<div class="data-item"><div class="data-label">申请总数</div><div class="data-value">' + apps.length + ' 条</div></div>';
            html += '<div class="data-item"><div class="data-label">管理员总数</div><div class="data-value">' + admins.length + ' 个</div></div>';
            
            if (apps.length > 0) {
                html += '<div class="data-label" style="margin-top:15px;">最近的申请：</div>';
                apps.slice(-5).reverse().forEach(function(app) {
                    html += '<div class="data-item">';
                    html += '<div><strong>' + app.name + '</strong></div>';
                    html += '<div>' + app.college + ' · ' + app.major + '</div>';
                    html += '<div style="color:rgba(255,255,255,0.5);font-size:11px;">' + new Date(app.submitTime).toLocaleString('zh-CN') + '</div>';
                    html += '</div>';
                });
            } else {
                html += '<div class="empty">暂无申请数据</div>';
            }
            
            document.getElementById('localStorage').innerHTML = html;
            log('本地数据加载成功：' + apps.length + ' 条申请', 'success');
        }
        
        async function testConnection() {
            log('测试云端连接...', 'info');
            
            try {
                var result = await supabase.from('applications').select('id').limit(1);
                if (result.error) throw result.error;
                log('云端连接正常 ✓', 'success');
                alert('✅ 云端连接正常\n\n可以正常读写数据');
            } catch (err) {
                log('云端连接失败：' + err.message, 'error');
                alert('❌ 云端连接失败\n\n' + err.message);
            }
        }
        
        async function insertTestData() {
            log('插入测试数据...', 'info');
            
            var testData = {
                name: '诊断测试_' + Date.now(),
                gender: '测试',
                college: '测试学院',
                major: '测试专业',
                grade: '测试',
                student_id: 'DIAGNOSIS',
                email: 'test@diagnosis.com',
                phone: '123456',
                skills: '测试',
                motivation: '这是诊断测试数据',
                submit_time: new Date().toISOString()
            };
            
            try {
                var result = await supabase.from('applications').insert([testData]);
                if (result.error) throw result.error;
                log('测试数据插入成功', 'success');
                checkSupabase();
                alert('✅ 测试数据已插入云端\n\n请在后台查看是否显示');
            } catch (err) {
                log('测试数据插入失败：' + err.message, 'error');
                alert('❌ 插入失败\n\n' + err.message);
            }
        }
        
        async function clearTestData() {
            log('清理测试数据...', 'info');
            
            try {
                var result = await supabase.from('applications').delete().like('name', '诊断测试_%');
                if (result.error) throw result.error;
                log('测试数据已清理', 'success');
                checkSupabase();
                alert('✅ 测试数据已清理');
            } catch (err) {
                log('清理失败：' + err.message, 'error');
                alert('❌ 清理失败\n\n' + err.message);
            }
        }
        
        window.addEventListener('load', function() {
            log('页面加载完成', 'info');
            setTimeout(init, 500);
        });
    </script>
</body>
</html>
