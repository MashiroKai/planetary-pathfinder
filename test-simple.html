<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端连接测试 - 行星探路者</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0B1E3B 0%, #1a3a5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .test-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 { font-size: 24px; margin-bottom: 30px; text-align: center; }
        .test-item {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .test-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .test-info { flex: 1; min-width: 0; }
        .test-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 5px; word-break: break-all; }
        .test-value { font-size: 14px; font-weight: 500; word-break: break-all; }
        .status { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; flex-shrink: 0; }
        .status.success { background: rgba(34,197,94,0.2); color: #22c55e; }
        .status.error { background: rgba(239,68,68,0.2); color: #ef4444; }
        .status.pending { background: rgba(251,191,36,0.2); color: #fbbf24; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            box-sizing: border-box;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; }
        .back-link:hover { color: white; }
        .log { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; margin-top: 20px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .log-item { margin-bottom: 5px; word-break: break-all; }
        .log-error { color: #ff6b6b; }
        .log-success { color: #51cf66; }
        .log-info { color: #74c0fc; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔗 云端连接测试</h1>
        
        <div class="test-item">
            <div class="test-icon">🌐</div>
            <div class="test-info">
                <div class="test-label">Supabase URL</div>
                <div class="test-value" id="urlValue">检查中...</div>
            </div>
            <div class="status pending" id="urlStatus">⏳</div>
        </div>

        <div class="test-item">
            <div class="test-icon">🔑</div>
            <div class="test-info">
                <div class="test-label">API Key</div>
                <div class="test-value" id="keyValue">检查中...</div>
            </div>
            <div class="status pending" id="keyStatus">⏳</div>
        </div>

        <div class="test-item">
            <div class="test-icon">📊</div>
            <div class="test-info">
                <div class="test-label">数据库表</div>
                <div class="test-value" id="tableValue">检查中...</div>
            </div>
            <div class="status pending" id="tableStatus">⏳</div>
        </div>

        <div class="test-item">
            <div class="test-icon">💾</div>
            <div class="test-info">
                <div class="test-label">数据读写</div>
                <div class="test-value" id="rwValue">检查中...</div>
            </div>
            <div class="status pending" id="rwStatus">⏳</div>
        </div>

        <button class="btn" id="testBtn" onclick="runTests()">运行测试</button>
        <a href="index.html" class="back-link">← 返回首页</a>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        // 配置
        var SUPABASE_URL = 'https://ufnxulsoyownqyqwolxm.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmbnh1bHNveW93bnF5cXdvbHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTI1NjEsImV4cCI6MjA4ODM4ODU2MX0.RO6QRQZlilS6v1H-C_MWcLd5QFv4UvWZvO7F8HNFd0E';
        
        var logEl = document.getElementById('log');
        
        function log(msg, type) {
            var div = document.createElement('div');
            div.className = 'log-item log-' + (type || 'info');
            div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }

        function showConfig() {
            document.getElementById('urlValue').textContent = SUPABASE_URL.replace(/https:\/\//, '');
            document.getElementById('keyValue').textContent = SUPABASE_KEY.substring(0, 15) + '...';
        }

        function runTests() {
            var btn = document.getElementById('testBtn');
            btn.disabled = true;
            btn.textContent = '测试中...';
            logEl.innerHTML = '';
            
            log('开始测试...', 'info');
            
            // Test 1: Check SDK
            if (typeof window.supabase === 'undefined') {
                log('Supabase SDK 未加载！', 'error');
                document.getElementById('urlStatus').className = 'status error';
                document.getElementById('urlStatus').textContent = '✗';
                btn.disabled = false;
                btn.textContent = '重新测试';
                return;
            }
            log('Supabase SDK 已加载', 'success');
            
            // Test 2: URL
            if (SUPABASE_URL && SUPABASE_URL.indexOf('YOUR_PROJECT_ID') === -1) {
                document.getElementById('urlStatus').className = 'status success';
                document.getElementById('urlStatus').textContent = '✓';
                log('URL 配置正确', 'success');
            } else {
                document.getElementById('urlStatus').className = 'status error';
                document.getElementById('urlStatus').textContent = '✗';
                log('URL 配置错误', 'error');
            }

            // Test 3: Key
            if (SUPABASE_KEY && SUPABASE_KEY.indexOf('YOUR_ANON_KEY') === -1) {
                document.getElementById('keyStatus').className = 'status success';
                document.getElementById('keyStatus').textContent = '✓';
                log('Key 配置正确', 'success');
            } else {
                document.getElementById('keyStatus').className = 'status error';
                document.getElementById('keyStatus').textContent = '✗';
                log('Key 配置错误', 'error');
            }

            // Create client
            log('创建 Supabase 客户端...', 'info');
            var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            log('客户端创建成功', 'success');

            // Test 4: Table access
            log('检查数据库表...', 'info');
            supabase.from('applications').select('id').limit(1).then(function(result) {
                if (result.error) {
                    log('表访问失败：' + result.error.message, 'error');
                    document.getElementById('tableStatus').className = 'status error';
                    document.getElementById('tableStatus').textContent = '✗';
                    document.getElementById('tableValue').textContent = result.error.message.substring(0, 50);
                    
                    if (result.error.message.indexOf('schema_migrations') !== -1) {
                        log('⚠️ 需要运行 SQL 修复脚本！', 'error');
                        setTimeout(function() {
                            alert('需要修复 Supabase 数据库！\n\n1. 打开 Supabase SQL Editor\n2. 运行 fix-supabase-init.sql\n3. 刷新此页面重试');
                        }, 500);
                    }
                } else {
                    log('数据库表访问成功', 'success');
                    document.getElementById('tableStatus').className = 'status success';
                    document.getElementById('tableStatus').textContent = '✓';
                    document.getElementById('tableValue').textContent = '可访问';
                }

                // Test 5: Read/Write
                log('测试数据写入...', 'info');
                var testData = {
                    name: 'Test_' + Date.now(),
                    gender: 'Test',
                    college: 'Test',
                    major: 'Test',
                    grade: 'Test',
                    student_id: 'TEST',
                    email: 'test@test.com',
                    phone: '123',
                    skills: 'Test',
                    motivation: 'Test data',
                    submit_time: new Date().toISOString()
                };

                supabase.from('applications').insert([testData]).then(function(insertResult) {
                    if (insertResult.error) {
                        log('写入失败：' + insertResult.error.message, 'error');
                        document.getElementById('rwStatus').className = 'status error';
                        document.getElementById('rwStatus').textContent = '✗';
                        btn.disabled = false;
                        btn.textContent = '重新测试';
                        return;
                    }

                    log('写入成功', 'success');
                    
                    // Cleanup - delete by name
                    var testName = testData.name;
                    supabase.from('applications').delete().eq('name', testName).then(function() {
                        log('测试数据已清理', 'info');
                    });

                    document.getElementById('rwStatus').className = 'status success';
                    document.getElementById('rwStatus').textContent = '✓';
                    document.getElementById('rwValue').textContent = '通过';
                    btn.disabled = false;
                    btn.textContent = '重新测试';

                    setTimeout(function() {
                        alert('✅ 所有测试通过！\n\n云端存储已就绪！');
                    }, 500);
                });
            }).catch(function(err) {
                log('表检查异常：' + err.message, 'error');
                document.getElementById('tableStatus').className = 'status error';
                document.getElementById('tableStatus').textContent = '✗';
                btn.disabled = false;
                btn.textContent = '重新测试';
            });
        }

        // Auto-run
        window.addEventListener('load', function() {
            log('页面加载完成', 'info');
            showConfig();
            setTimeout(runTests, 1000);
        });
    </script>
</body>
</html>
