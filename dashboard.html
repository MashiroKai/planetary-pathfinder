<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 行星探路者</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --sidebar-width: 260px;
        }
        body {
            background: #0f0f12;
        }
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: var(--sidebar-width);
            background: #1a1a1f;
            border-right: 1px solid #2a2a30;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo {
            font-size: 18px;
            font-weight: 700;
            color: white;
            margin-bottom: 40px;
            padding-left: 15px;
        }
        .sidebar-logo span {
            color: var(--accent);
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li {
            margin-bottom: 8px;
        }
        .sidebar-menu a {
            display: block;
            padding: 12px 15px;
            color: #a0a0a8;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255,107,53,0.1);
            color: var(--accent);
        }
        .sidebar-menu a i {
            margin-right: 10px;
            width: 20px;
            display: inline-block;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .dashboard-header h1 {
            color: white;
            font-size: 28px;
            margin: 0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info span {
            color: #a0a0a8;
        }
        .btn-logout {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #3a3a40;
            color: #a0a0a8;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-logout:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #1a1a1f;
            border: 1px solid #2a2a30;
            border-radius: 12px;
            padding: 25px;
        }
        .stat-card .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 5px;
        }
        .stat-card .stat-label {
            color: #a0a0a8;
            font-size: 14px;
        }
        .data-section {
            background: #1a1a1f;
            border: 1px solid #2a2a30;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .data-section h2 {
            color: white;
            font-size: 20px;
            margin: 0 0 20px;
        }
        .data-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-action {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,53,0.4);
        }
        .btn-secondary {
            background: #2a2a30;
            color: white;
            border: 1px solid #3a3a40;
        }
        .btn-secondary:hover {
            border-color: var(--accent);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #2a2a30;
        }
        .data-table th {
            color: #a0a0a8;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
        }
        .data-table td {
            color: white;
            font-size: 14px;
        }
        .data-table tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0a0a8;
        }
        .empty-state p {
            margin-top: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1a1f;
            border: 1px solid #2a2a30;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content h3 {
            color: white;
            margin: 0 0 20px;
        }
        .modal-content .form-group {
            margin-bottom: 15px;
        }
        .modal-content label {
            display: block;
            color: #a0a0a8;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #0f0f12;
            border: 1px solid #2a2a30;
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }
        .modal-content input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                z-index: 1000;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-logo">PLANETARY <span>PATHFINDER</span></div>
            <ul class="sidebar-menu">
                <li><a href="#" class="active" onclick="showSection('applications')"><i>📋</i> 报名申请</a></li>
                <li><a href="#" onclick="showSection('admins')"><i>👤</i> 管理员管理</a></li>
                <li><a href="#" onclick="showSection('settings')"><i>⚙️</i> 系统设置</a></li>
                <li><a href="index.html"><i>🏠</i> 返回首页</a></li>
            </ul>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="dashboard-header">
                <h1>管理后台</h1>
                <div class="user-info">
                    <span id="welcomeUser">欢迎，管理员</span>
                    <button class="btn-logout" onclick="handleLogout()">退出登录</button>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalApplications">0</div>
                    <div class="stat-label">总申请数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="todayApplications">0</div>
                    <div class="stat-label">今日申请</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalAdmins">0</div>
                    <div class="stat-label">管理员数</div>
                </div>
            </div>

            <!-- 报名申请列表 -->
            <div class="data-section" id="applicationsSection">
                <h2>📋 报名申请列表</h2>
                <div class="data-actions">
                    <button class="btn-action btn-primary" onclick="exportData()">📥 导出数据 (CSV)</button>
                    <button class="btn-action btn-secondary" onclick="refreshData()">🔄 刷新数据</button>
                </div>
                <div id="applicationsTable">
                    <div class="empty-state">
                        <p>加载中...</p>
                    </div>
                </div>
            </div>

            <!-- 管理员管理 -->
            <div class="data-section" id="adminsSection" style="display:none;">
                <h2>👤 管理员管理</h2>
                <div class="data-actions">
                    <button class="btn-action btn-primary" onclick="showAddAdminModal()">➕ 添加管理员</button>
                </div>
                <div id="adminsTable">
                    <div class="empty-state">
                        <p>加载中...</p>
                    </div>
                </div>
            </div>

            <!-- 系统设置 -->
            <div class="data-section" id="settingsSection" style="display:none;">
                <h2>⚙️ 系统设置</h2>
                <p style="color: #a0a0a8;">OpenClaw 控制接口已启用</p>
                <p style="color: #a0a0a8; font-size: 13px; margin-top: 10px;">
                    可通过飞书机器人调用 API 进行管理操作
                </p>
            </div>
        </main>
    </div>

    <!-- 添加管理员模态框 -->
    <div id="addAdminModal" class="modal">
        <div class="modal-content">
            <h3>添加管理员</h3>
            <form onsubmit="handleAddAdmin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="newAdminUsername" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="newAdminPassword" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-action btn-secondary" onclick="closeAddAdminModal()">取消</button>
                    <button type="submit" class="btn-action btn-primary">添加</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
