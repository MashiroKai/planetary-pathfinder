<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端连接测试 - 行星探路者</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="cloud-config.js"></script>
    <script src="cloud-storage.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0B1E3B 0%, #1a3a5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            padding: 20px;
        }
        .test-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 { font-size: 24px; margin-bottom: 30px; text-align: center; }
        .test-item {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .test-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        .test-info { flex: 1; }
        .test-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 5px; }
        .test-value { font-size: 14px; font-weight: 500; }
        .status { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status.success { background: rgba(34,197,94,0.2); color: #22c55e; }
        .status.error { background: rgba(239,68,68,0.2); color: #ef4444; }
        .status.pending { background: rgba(251,191,36,0.2); color: #fbbf24; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔗 云端连接测试</h1>
        
        <div class="test-item">
            <div class="test-icon">🌐</div>
            <div class="test-info">
                <div class="test-label">Supabase URL</div>
                <div class="test-value" id="urlValue">检查中...</div>
            </div>
            <div class="status pending" id="urlStatus">⏳ 检查中</div>
        </div>

        <div class="test-item">
            <div class="test-icon">🔑</div>
            <div class="test-info">
                <div class="test-label">API Key</div>
                <div class="test-value" id="keyValue">检查中...</div>
            </div>
            <div class="status pending" id="keyStatus">⏳ 检查中</div>
        </div>

        <div class="test-item">
            <div class="test-icon">📊</div>
            <div class="test-info">
                <div class="test-label">数据库表</div>
                <div class="test-value" id="tableValue">检查中...</div>
            </div>
            <div class="status pending" id="tableStatus">⏳ 检查中</div>
        </div>

        <div class="test-item">
            <div class="test-icon">💾</div>
            <div class="test-info">
                <div class="test-label">数据读写</div>
                <div class="test-value" id="rwValue">检查中...</div>
            </div>
            <div class="status pending" id="rwStatus">⏳ 检查中</div>
        </div>

        <button class="btn" id="testBtn" onclick="runTests()">运行完整测试</button>
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>

    <script>
        function waitForConfig(callback, maxAttempts) {
            var attempts = 0;
            var check = function() {
                attempts++;
                if (typeof SUPABASE_URL !== 'undefined' && typeof window.supabaseClient !== 'undefined') {
                    callback();
                } else if (attempts < maxAttempts) {
                    console.log('[Test] 等待配置加载... (' + attempts + '/' + maxAttempts + ')');
                    setTimeout(check, 200);
                } else {
                    console.error('[Test] 配置加载超时');
                    alert('❌ 配置加载失败\n\n请刷新页面重试');
                }
            };
            check();
        }

        function showConfig() {
            document.getElementById('urlValue').textContent = SUPABASE_URL.replace(/https:\/\//, '').replace(/\.supabase\.co$/, '.supabase.co');
            document.getElementById('keyValue').textContent = SUPABASE_KEY.substring(0, 20) + '...';
        }

        function runTests() {
            var btn = document.getElementById('testBtn');
            btn.disabled = true;
            btn.textContent = '测试中...';

            console.log('[Test] 开始运行测试...');

            // Test 1: URL
            if (SUPABASE_URL && SUPABASE_URL.indexOf('YOUR_PROJECT_ID') === -1) {
                document.getElementById('urlStatus').className = 'status success';
                document.getElementById('urlStatus').textContent = '✓ 有效';
            } else {
                document.getElementById('urlStatus').className = 'status error';
                document.getElementById('urlStatus').textContent = '✗ 无效';
            }

            // Test 2: Key
            if (SUPABASE_KEY && SUPABASE_KEY.indexOf('YOUR_ANON_KEY') === -1) {
                document.getElementById('keyStatus').className = 'status success';
                document.getElementById('keyStatus').textContent = '✓ 有效';
            } else {
                document.getElementById('keyStatus').className = 'status error';
                document.getElementById('keyStatus').textContent = '✗ 无效';
            }

            // Test 3: Table
            console.log('[Test] 检查数据库表...');
            var client = window.supabaseClient;
            
            client.from('applications').select('id').limit(1).then(function(result) {
                if (result.error) {
                    console.error('[Test] 表检查错误:', result.error);
                    document.getElementById('tableStatus').className = 'status error';
                    document.getElementById('tableStatus').textContent = '✗ 失败';
                    document.getElementById('tableValue').textContent = result.error.message;
                    
                    // Check if it's the schema_migrations error
                    if (result.error.message.indexOf('schema_migrations') !== -1) {
                        setTimeout(function() {
                            alert('⚠️ Supabase 初始化错误\n\n错误：relation "supabase_migrations.schema_migrations" does not exist\n\n解决方法：\n1. 打开 Supabase SQL Editor\n2. 运行 fix-supabase-init.sql 脚本\n3. 刷新此页面重试');
                        }, 500);
                    }
                } else {
                    console.log('[Test] 数据库表检查通过');
                    document.getElementById('tableStatus').className = 'status success';
                    document.getElementById('tableStatus').textContent = '✓ 正常';
                    document.getElementById('tableValue').textContent = 'applications 表可访问';
                }

                // Test 4: Read/Write
                console.log('[Test] 开始读写测试...');
                var testData = {
                    name: '测试_' + Date.now(),
                    gender: '测试',
                    college: '测试',
                    major: '测试',
                    grade: '测试',
                    student_id: 'TEST',
                    email: 'test@test.com',
                    phone: '123',
                    skills: '测试',
                    motivation: '测试数据',
                    submitTime: new Date().toISOString(),
                    is_test: true
                };

                client.from('applications').insert([testData]).then(function(insertResult) {
                    if (insertResult.error) {
                        console.error('[Test] 写入失败:', insertResult.error);
                        document.getElementById('rwStatus').className = 'status error';
                        document.getElementById('rwStatus').textContent = '✗ 失败';
                        document.getElementById('rwValue').textContent = insertResult.error.message;
                        btn.disabled = false;
                        btn.textContent = '重新测试';
                        return;
                    }

                    console.log('[Test] 写入成功');
                    
                    // Delete test data
                    client.from('applications').delete().eq('is_test', true).then(function() {
                        console.log('[Test] 测试数据已清理');
                    });

                    document.getElementById('rwStatus').className = 'status success';
                    document.getElementById('rwStatus').textContent = '✓ 正常';
                    document.getElementById('rwValue').textContent = '读写测试通过';
                    btn.disabled = false;
                    btn.textContent = '重新测试';

                    setTimeout(function() {
                        alert('✅ 所有测试通过！\n\n云端存储已就绪！');
                    }, 500);
                });
            }).catch(function(err) {
                console.error('[Test] 表检查异常:', err);
                document.getElementById('tableStatus').className = 'status error';
                document.getElementById('tableStatus').textContent = '✗ 失败';
                document.getElementById('tableValue').textContent = err.message;
                btn.disabled = false;
                btn.textContent = '重新测试';
            });
        }

        // Auto-run on load
        window.addEventListener('DOMContentLoaded', function() {
            console.log('[Test] 页面加载完成');
            waitForConfig(function() {
                console.log('[Test] 配置加载完成');
                console.log('[Test] Supabase 客户端:', typeof window.supabaseClient);
                showConfig();
                setTimeout(runTests, 500);
            }, 50);
        });
    </script>
</body>
</html>
