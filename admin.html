<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 行星探路者</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0B1E3B 0%, #1a3a5c 100%);
        }
        .admin-login-box {
            background: var(--bg-card);
            padding: 50px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .admin-login-box h2 {
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        .admin-login-box .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .admin-login-box .form-group {
            margin-bottom: 20px;
        }
        .admin-login-box label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
        }
        .admin-login-box input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-light);
            color: var(--text-primary);
            font-size: 15px;
        }
        .admin-login-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
        }
        .admin-login-box .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .admin-login-box .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,53,0.4);
        }
        .admin-login-box .error-msg {
            color: #ff4444;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
        }
        .back-home:hover {
            color: white;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← 返回首页</a>
    <div class="admin-login-container">
        <div class="admin-login-box">
            <h2>管理员登录</h2>
            <p class="subtitle">行星探路者报名管理系统</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">登录</button>
                <p class="error-msg" id="errorMsg">用户名或密码错误</p>
            </form>
        </div>
    </div>
    <script>
        // 检查是否已登录
        if (localStorage.getItem('adminToken')) {
            window.location.href = 'dashboard.html';
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminUser', data.username);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                }
            })
            .catch(err => {
                document.getElementById('errorMsg').style.display = 'block';
            });
        }
    </script>
</body>
</html>
